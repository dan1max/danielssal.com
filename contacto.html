<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto · Daniel Sánchez Salvador</title>
  <meta name="description" content="Contacta con Daniel Sánchez Salvador.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js" defer></script>
  <style>
    .contact-wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .contact-field {
      margin-bottom: 1.6rem;
    }

    .contact-field label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .contact-field input,
    .contact-field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--gold-border);
      padding: 0.5rem 0;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .contact-field input:focus,
    .contact-field textarea:focus {
      border-bottom-color: var(--gold);
    }

    .contact-field textarea {
      min-height: 120px;
    }

    .contact-submit {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.75rem 2.5rem;
      background: transparent;
      border: 1px solid var(--gold-border);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .contact-submit:hover {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    .contact-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .contact-feedback {
      margin-top: 1.5rem;
      font-size: 0.92rem;
      font-style: italic;
      display: none;
    }

    .contact-feedback.ok  { color: #5A8A5A; display: block; }
    .contact-feedback.err { color: #A04030; display: block; }

    .contact-info {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--gold-border);
      font-size: 0.88rem;
      color: var(--ink-light);
      text-align: center;
    }

    .contact-info a {
      color: var(--gold);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">D<span>.</span>S<span>.</span>S<span>.</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="articulos.html">Artículos</a></li>
      <li><a href="links.html">Links</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
    </ul>
  </nav>

  <main>

    <div class="page-header">
      <h1>Contacto</h1>
      <p>¿Tienes algo que decirme? Escríbeme.</p>
    </div>

    <div class="ornament">
      <svg class="ornament-svg" viewBox="0 0 120 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="10" x2="42" y2="10"/>
        <path d="M46 10 L52 4 L58 10 L52 16 Z"/>
        <circle cx="60" cy="10" r="3"/>
        <path d="M62 10 L68 4 L74 10 L68 16 Z"/>
        <line x1="78" y1="10" x2="120" y2="10"/>
      </svg>
    </div>

    <div class="contact-wrap">
      <div class="contact-field">
        <label for="contactName">Nombre</label>
        <input type="text" id="contactName" name="name" autocomplete="name" required>
      </div>
      <div class="contact-field">
        <label for="contactEmail">Correo electrónico</label>
        <input type="email" id="contactEmail" name="email" autocomplete="email" required>
      </div>
      <div class="contact-field">
        <label for="contactMessage">Mensaje</label>
        <textarea id="contactMessage" name="message" required></textarea>
      </div>

      <button class="contact-submit" id="contactSubmit">Enviar</button>
      <p class="contact-feedback" id="contactFeedback"></p>

      <div class="contact-info">
        <p>También puedes escribirme directamente a <a href="mailto:contacto@danielssal.com">contacto@danielssal.com</a></p>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-ornament">— ✦ —</div>
      <p>© MMXXVI Daniel Sánchez Salvador · <a href="index.html">danielssal.com</a></p>
    </div>
  </footer>

  <script>
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    document.getElementById('contactSubmit').addEventListener('click', async () => {
      const name    = document.getElementById('contactName').value.trim();
      const email   = document.getElementById('contactEmail').value.trim();
      const message = document.getElementById('contactMessage').value.trim();
      const btn      = document.getElementById('contactSubmit');
      const feedback = document.getElementById('contactFeedback');

      if (!name || !email || !message) {
        feedback.textContent = 'Por favor, rellena todos los campos.';
        feedback.className = 'contact-feedback err';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando…';
      feedback.className = 'contact-feedback';

      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: 'aed4e42f-a534-4e06-83ab-6c9240c2b54c',
            name,
            email,
            message
          })
        });

        const data = await res.json();

        if (data.success) {
          feedback.textContent = 'Mensaje enviado. Te responderé lo antes posible.';
          feedback.className = 'contact-feedback ok';
          document.getElementById('contactName').value = '';
          document.getElementById('contactEmail').value = '';
          document.getElementById('contactMessage').value = '';
          btn.textContent = 'Enviado';
        } else {
          throw new Error();
        }
      } catch {
        feedback.textContent = 'Ha habido un error al enviar. Inténtalo de nuevo o escríbeme directamente.';
        feedback.className = 'contact-feedback err';
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    });
  </script>

  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
