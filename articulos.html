<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículos · Daniel Sánchez Salvador</title>
  <meta name="description" content="Escritos y artículos de Daniel Sánchez Salvador en Substack.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js" defer></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <style>
    .articles-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .articles-count {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    .article-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--gold-border);
      transition: border-color 0.2s, transform 0.2s;
    }

    .article-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }

    .article-cover {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .article-cover-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #F0E8D0 0%, #E0D4B8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .article-cover-placeholder svg {
      opacity: 0.25;
      width: 40px;
      height: 40px;
    }

    .article-body {
      padding: 1.2rem 1.4rem 1.4rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .article-date {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .article-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }

    .article-card:hover .article-title { color: var(--gold); }

    .article-subtitle {
      font-size: 0.88rem;
      color: var(--ink-light);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .article-read {
      margin-top: 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .feed-state {
      text-align: center;
      padding: 3rem 0;
      color: var(--ink-faint);
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 1px solid var(--gold-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.8rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .articles-grid { grid-template-columns: 1fr; gap: 1.2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">D<span>.</span>S<span>.</span>S<span>.</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="articulos.html" class="active">Artículos</a></li>
      <li><a href="links.html">Links</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <main>

    <div class="page-header">
      <h1>Artículos</h1>
      <p>Escritura & Reflexión · <a href="https://daniconomics.substack.com" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;">Daniconomics en Substack →</a></p>
    </div>

    <div class="ornament">
      <svg class="ornament-svg" viewBox="0 0 120 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="10" x2="42" y2="10"/>
        <path d="M46 10 L52 4 L58 10 L52 16 Z"/>
        <circle cx="60" cy="10" r="3"/>
        <path d="M62 10 L68 4 L74 10 L68 16 Z"/>
        <line x1="78" y1="10" x2="120" y2="10"/>
      </svg>
    </div>

    <div class="articles-header">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink-light);font-style:italic;">Últimas publicaciones</span>
      <span class="articles-count" id="articlesCount"></span>
    </div>

    <div id="feedContainer">
      <div class="feed-state">
        <div class="spinner"></div>
        <p>Cargando artículos…</p>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-ornament">— ✦ —</div>
      <p>© MMXXVI Daniel Sánchez Salvador · <a href="index.html">danielssal.com</a></p>
      <p style="margin-top:0.4rem;font-size:0.82rem;">contacto@danielssal.com</p>
    </div>
  </footer>

  <script>
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('es-ES', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function loadFeed() {
      const container = document.getElementById('feedContainer');
      const countEl   = document.getElementById('articlesCount');

      try {
        const res = await fetch('/api/feed');
        if (!res.ok) throw new Error();
        const posts = await res.json();
        if (!Array.isArray(posts) || !posts.length) throw new Error();

        const publicPosts = posts.filter(p => !p.audience || p.audience === 'everyone');
        countEl.textContent = `${publicPosts.length} artículos`;

        const grid = document.createElement('div');
        grid.className = 'articles-grid';

        publicPosts.forEach(post => {
          const a = document.createElement('a');
          a.href = post.canonical_url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.className = 'article-card';

          const cover = post.cover_image
            ? `<img class="article-cover" src="${post.cover_image}" alt="" loading="lazy">`
            : `<div class="article-cover-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                  <rect x="3" y="3" width="18" height="18" rx="1"/>
                  <path d="M3 15l5-5 4 4 3-3 6 6"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                </svg>
               </div>`;

          const subtitle = post.subtitle
            ? `<p class="article-subtitle">${post.subtitle}</p>`
            : '';

          a.innerHTML = cover
            + `<div class="article-body">
                <div class="article-date">${formatDate(post.post_date)}</div>
                <div class="article-title">${post.title}</div>
                ${subtitle}
                <span class="article-read">Leer artículo →</span>
               </div>`;

          grid.appendChild(a);
        });

        container.innerHTML = '';
        container.appendChild(grid);

      } catch {
        container.innerHTML = `
          <div class="feed-state">
            <p>No se han podido cargar los artículos.</p>
            <p style="margin-top:0.8rem;">
              <a href="https://daniconomics.substack.com" target="_blank" rel="noopener"
                 style="color:var(--gold);text-decoration:none;">
                Leer directamente en Substack →
              </a>
            </p>
          </div>`;
      }
    }

    loadFeed();
  </script>

  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
