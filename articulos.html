<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículos · Daniel Sánchez Salvador</title>
  <meta name="description" content="Escritos y artículos de Daniel Sánchez Salvador en Substack.">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js" defer></script>
  <style>
    .article-card {
      border-bottom: 1px solid var(--gold-border);
      padding: 1.8rem 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.2s;
    }
    .article-card:first-child { padding-top: 0; }
    .article-card:hover { padding-left: 0.5rem; }
    .article-card:hover .article-title { color: var(--gold); }

    .article-date {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .article-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 0.4rem;
      transition: color 0.2s;
    }

    .article-excerpt {
      font-size: 0.92rem;
      color: var(--ink-light);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-arrow {
      color: var(--gold);
      font-size: 1.2rem;
      margin-top: 0.3rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .article-card:hover .article-arrow { opacity: 1; transform: translateX(3px); }

    .feed-state {
      text-align: center;
      padding: 3rem 0;
      color: var(--ink-faint);
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 1px solid var(--gold-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.8rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .articles-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .articles-count {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">D<span>.</span>S<span>.</span>S<span>.</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="articulos.html" class="active">Artículos</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </nav>

  <main>

    <div class="page-header">
      <h1>Artículos</h1>
      <p>Escritura & Reflexión · <a href="https://daniconomics.substack.com" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;">Daniconomics en Substack →</a></p>
    </div>

    <div class="ornament">
      <svg class="ornament-svg" viewBox="0 0 120 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="10" x2="42" y2="10"/>
        <path d="M46 10 L52 4 L58 10 L52 16 Z"/>
        <circle cx="60" cy="10" r="3"/>
        <path d="M62 10 L68 4 L74 10 L68 16 Z"/>
        <line x1="78" y1="10" x2="120" y2="10"/>
      </svg>
    </div>

    <div class="articles-header">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink-light);font-style:italic;">Últimas publicaciones</span>
      <span class="articles-count" id="articlesCount"></span>
    </div>

    <div id="feedContainer">
      <div class="feed-state">
        <div class="spinner"></div>
        <p>Cargando artículos…</p>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-ornament">— ✦ —</div>
      <p>© MMXXVI Daniel Sánchez Salvador · <a href="index.html">danielssal.com</a></p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => navLinks.classList.toggle('open'));

    const RSS_URL = 'https://daniconomics.substack.com/feed';
    const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&count=20`;

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('es-ES', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    async function loadFeed() {
      const container = document.getElementById('feedContainer');
      const countEl   = document.getElementById('articlesCount');

      try {
        const res  = await fetch(API_URL);
        const data = await res.json();

        if (data.status !== 'ok' || !data.items?.length) throw new Error();

        countEl.textContent = `${data.items.length} artículos`;

        container.innerHTML = data.items.map(item => {
          const excerpt = stripHtml(item.description).slice(0, 180).trim() + '…';
          return `
            <a href="${item.link}" target="_blank" rel="noopener" class="article-card">
              <div>
                <div class="article-date">${formatDate(item.pubDate)}</div>
                <div class="article-title">${item.title}</div>
                <div class="article-excerpt">${excerpt}</div>
              </div>
              <span class="article-arrow">→</span>
            </a>`;
        }).join('');

      } catch {
        container.innerHTML = `
          <div class="feed-state">
            <p>No se han podido cargar los artículos.</p>
            <p style="margin-top:0.8rem;">
              <a href="https://daniconomics.substack.com" target="_blank" rel="noopener"
                 style="color:var(--gold);text-decoration:none;">
                Leer directamente en Substack →
              </a>
            </p>
          </div>`;
      }
    }

    loadFeed();
  </script>

  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
